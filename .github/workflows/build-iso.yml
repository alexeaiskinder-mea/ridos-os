- name: Full RIDOS OS Build (Desktop + Tools)
        run: |
          sudo mkdir -p chroot iso/live iso/boot/grub
          
          # 1. Full Bootstrap
          sudo debootstrap --arch=amd64 bookworm chroot http://deb.debian.org/debian/

          # 2. Mount for installation
          sudo mount --bind /dev chroot/dev
          sudo mount --bind /proc chroot/proc
          sudo mount --bind /sys chroot/sys

          # 3. Install the Full Desktop Environment and Tools
          sudo chroot chroot apt-get update
          sudo chroot chroot apt-get install -y \
            live-boot linux-image-amd64 xfce4 xfce4-terminal \
            lightdm firefox-esr python3 python3-pip \
            firmware-linux firmware-linux-nonfree \
            network-manager pulseaudio sudo \
            --no-install-recommends

          # 4. (Optional) Add your RIDOS branding/user scripts here
          
          # 5. Cleanup and Unmount
          sudo umount chroot/sys chroot/proc chroot/dev
          
          # 6. Build SquashFS (The heavy part)
          sudo mksquashfs chroot filesystem.squashfs -comp xz
          sudo cp filesystem.squashfs iso/live/
          
          # 7. Copy Kernel
          sudo cp chroot/boot/vmlinuz-* iso/live/vmlinuz
          sudo cp chroot/boot/initrd.img-* iso/live/initrd
