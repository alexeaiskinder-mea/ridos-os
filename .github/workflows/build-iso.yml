name: Build RIDOS OS ISO

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            debootstrap squashfs-tools xorriso \
            grub-pc-bin grub-efi-amd64-bin grub2-common \
            mtools dosfstools gnupg2 curl wget \
            imagemagick librsvg2-bin \
            isolinux syslinux syslinux-common syslinux-utils
          echo "Done"

      - name: Bootstrap Debian
        run: |
          curl -fsSL https://ftp-master.debian.org/keys/release-12.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/debian-bookworm.gpg
          sudo debootstrap \
            --arch=amd64 \
            --variant=minbase \
            --keyring=/usr/share/keyrings/debian-bookworm.gpg \
            --include=systemd,systemd-sysv,udev,sudo,locales,bash,apt-transport-https,ca-certificates \
            bookworm chroot http://deb.debian.org/debian/
          echo "Bootstrap done"

      - name: Install all packages
        run: |
          sudo mount --bind /dev chroot/dev
          sudo mount --bind /proc chroot/proc
          sudo mount --bind /sys chroot/sys
          sudo mount --bind /run chroot/run

          sudo tee chroot/etc/apt/sources.list << 'EOF'
          deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware
          deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
          EOF

          sudo chroot chroot apt-get update -qq

          # Core system
          sudo chroot chroot apt-get install -y \
            live-boot live-boot-initramfs-tools \
            linux-image-amd64 initramfs-tools \
            grub-pc grub2-common \
            bash-completion tzdata locales

          # Hardware drivers
          sudo chroot chroot apt-get install -y \
            firmware-linux firmware-linux-free firmware-linux-nonfree \
            firmware-iwlwifi firmware-atheros firmware-realtek \
            firmware-b43-installer firmware-amd-graphics \
            firmware-misc-nonfree intel-microcode amd64-microcode \
            xserver-xorg xserver-xorg-video-all \
            xserver-xorg-input-all \
            xserver-xorg-video-intel xserver-xorg-video-amdgpu \
            xserver-xorg-video-nouveau xserver-xorg-video-fbdev \
            xserver-xorg-video-vesa \
            alsa-utils pulseaudio pulseaudio-utils \
            bluez bluetooth \
            cups printer-driver-all \
            network-manager network-manager-gnome \
            wpasupplicant wireless-tools \
            usb-modeswitch pciutils usbutils \
            acpi acpid laptop-detect \
            ntfs-3g exfat-fuse \
            --no-install-recommends || true

          # XFCE Desktop
          sudo chroot chroot apt-get install -y \
            xfce4 xfce4-terminal xfce4-whiskermenu-plugin \
            xfce4-power-manager xfce4-notifyd \
            lightdm lightdm-gtk-greeter \
            thunar thunar-archive-plugin \
            ristretto mousepad \
            adwaita-icon-theme papirus-icon-theme \
            fonts-dejavu fonts-liberation fonts-noto \
            fonts-noto-color-emoji

          # Browsers
          sudo chroot chroot apt-get install -y firefox-esr

          # Dev & IT tools
          sudo chroot chroot apt-get install -y \
            python3 python3-pip python3-venv \
            python3-flask python3-flask-socketio \
            python3-requests python3-psutil \
            git vim nano curl wget \
            nmap net-tools traceroute \
            openssh-client openssh-server \
            htop neofetch tree \
            zip unzip p7zip-full \
            parted gparted \
            rsync dosfstools \
            smartmontools hdparm \
            memtest86+ \
            lshw dmidecode \
            iotop iftop \
            wireshark-common tshark \
            nvme-cli sdparm \
            lynis rkhunter fail2ban ufw \
            python3-tk ansible

          sudo umount chroot/run chroot/sys chroot/proc chroot/dev
          echo "All packages installed"

      - name: Configure system
        run: |
          echo "ridos-os" | sudo tee chroot/etc/hostname

          sudo tee chroot/etc/hosts << 'EOF'
          127.0.0.1 localhost
          127.0.1.1 ridos-os
          EOF

          echo "en_US.UTF-8 UTF-8" | sudo tee chroot/etc/locale.gen
          echo "ar_IQ.UTF-8 UTF-8" | sudo tee -a chroot/etc/locale.gen
          sudo chroot chroot locale-gen
          echo "LANG=en_US.UTF-8" | sudo tee chroot/etc/default/locale

          sudo chroot chroot ln -sf /usr/share/zoneinfo/Asia/Baghdad /etc/localtime

          sudo chroot chroot useradd -m -s /bin/bash \
            -G sudo,audio,video,netdev,plugdev,bluetooth ridos
          echo "ridos:ridos" | sudo chroot chroot chpasswd
          echo "root:ridos" | sudo chroot chroot chpasswd

          # LightDM - show login screen (NO autologin)
          sudo mkdir -p chroot/etc/lightdm/lightdm.conf.d
          sudo tee chroot/etc/lightdm/lightdm.conf.d/50-ridos.conf << 'EOF'
          [Seat:*]
          user-session=xfce
          greeter-session=lightdm-gtk-greeter
          EOF

          # LightDM RIDOS branding on login screen
          sudo tee chroot/etc/lightdm/lightdm-gtk-greeter.conf << 'EOF'
          [greeter]
          background=#6B21A8
          theme-name=Adwaita-dark
          icon-theme-name=Papirus-Dark
          font-name=Noto Sans 11
          indicators=~host;~spacer;~clock;~spacer;~power
          clock-format=%A, %d %B %Y  %H:%M
          position=50%,center 50%,center
          EOF

          # RIDOS OS release branding
          sudo tee chroot/etc/os-release << 'EOF'
          PRETTY_NAME="RIDOS OS v1.1.0 Baghdad"
          NAME="RIDOS OS"
          VERSION_ID="1.1.0"
          VERSION="1.1.0 (Baghdad)"
          ID=ridos
          ID_LIKE=debian
          HOME_URL="https://github.com/alexeaiskinder-mea/ridos-os"
          SUPPORT_URL="https://github.com/alexeaiskinder-mea/ridos-os/issues"
          BUG_REPORT_URL="https://github.com/alexeaiskinder-mea/ridos-os/issues"
          EOF

          sudo tee chroot/etc/issue << 'EOF'
          RIDOS OS v1.1.0 Baghdad - AI-Powered Linux
          Username: ridos | Password: ridos
          EOF

          # Fast shutdown 5 seconds
          sudo mkdir -p chroot/etc/systemd/system.conf.d
          sudo tee chroot/etc/systemd/system.conf.d/timeout.conf << 'EOF'
          [Manager]
          DefaultTimeoutStopSec=5s
          DefaultTimeoutStartSec=10s
          ShutdownWatchdogSec=10s
          EOF

          # Enable services
          sudo chroot chroot systemctl enable lightdm NetworkManager \
            bluetooth cups acpid 2>/dev/null || true

          # Mask services that cause boot hangs in live environment
          for SVC in \
            NetworkManager-wait-online.service \
            systemd-networkd-wait-online.service \
            plymouth-quit-wait.service \
            apt-daily.service apt-daily-upgrade.service \
            apt-daily.timer apt-daily-upgrade.timer \
            exim4.service e2scrub_reap.service; do
            sudo chroot chroot systemctl mask "$SVC" 2>/dev/null || true
          done

          # Blacklist nouveau (prevents Intel+NVIDIA Optimus lockup)
          sudo mkdir -p chroot/etc/modprobe.d
          echo 'blacklist nouveau'         | sudo tee    chroot/etc/modprobe.d/blacklist-nouveau.conf > /dev/null
          echo 'blacklist nvidiafb'        | sudo tee -a chroot/etc/modprobe.d/blacklist-nouveau.conf > /dev/null
          echo 'options nouveau modeset=0' | sudo tee -a chroot/etc/modprobe.d/blacklist-nouveau.conf > /dev/null

          echo "System configured"

      - name: Apply RIDOS branding and theme
        run: |
          sudo mkdir -p chroot/home/ridos/.config/xfce4/xfconf/xfce-perchannel-xml

          # Copy RIDOS wallpapers
          sudo mkdir -p chroot/usr/share/ridos/wallpapers chroot/home/ridos/Pictures
          sudo cp ridos-core/RIDOS_OS_wallpaper_Main.png chroot/usr/share/ridos/wallpapers/ 2>/dev/null || true
          sudo cp ridos-core/RIDOS_OS_wallpaper.png      chroot/home/ridos/Pictures/RIDOS_OS_wallpaper_light.png 2>/dev/null || true
          sudo cp ridos-core/RIDOS_OS_wallpaper_Main.png chroot/home/ridos/Pictures/RIDOS_OS_wallpaper_dark.png 2>/dev/null || true

          sudo tee chroot/home/ridos/.config/xfce4/xfconf/xfce-perchannel-xml/xsettings.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xsettings" version="1.0">
            <property name="Net" type="empty">
              <property name="ThemeName" type="string" value="Adwaita-dark"/>
              <property name="IconThemeName" type="string" value="Papirus-Dark"/>
            </property>
            <property name="Gtk" type="empty">
              <property name="FontName" type="string" value="Noto Sans 10"/>
              <property name="MonospaceFontName" type="string" value="Noto Mono 10"/>
              <property name="CursorThemeName" type="string" value="Adwaita"/>
            </property>
          </channel>
          EOF

          sudo tee chroot/home/ridos/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-desktop.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xfce4-desktop" version="1.0">
            <property name="backdrop" type="empty">
              <property name="screen0" type="empty">
                <property name="monitorVirtual1" type="empty">
                  <property name="workspace0" type="empty">
                    <property name="color-style" type="int" value="0"/>
                    <property name="image-style" type="int" value="5"/>
                    <property name="last-image" type="string" value="/usr/share/ridos/wallpapers/RIDOS_OS_wallpaper_Main.png"/>
                    <property name="image-show" type="bool" value="true"/>
                  </property>
                </property>
              </property>
            </property>
          </channel>
          EOF

          sudo tee chroot/home/ridos/.config/xfce4/xfconf/xfce-perchannel-xml/xfwm4.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xfwm4" version="1.0">
            <property name="general" type="empty">
              <property name="theme" type="string" value="Default-dark"/>
              <property name="title_font" type="string" value="Noto Sans Bold 10"/>
            </property>
          </channel>
          EOF

          # Desktop shortcuts
          sudo mkdir -p chroot/home/ridos/Desktop

          # AI Shell shortcut
          sudo tee chroot/home/ridos/Desktop/ridos-ai.desktop << 'EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=RIDOS AI Shell
          Comment=AI-powered IT Assistant
          Exec=xfce4-terminal --title="RIDOS AI Shell" -e "python3 /opt/ridos/bin/ridos_shell.py"
          Icon=utilities-terminal
          Terminal=false
          Categories=System;
          EOF

          # Firefox shortcut
          sudo tee chroot/home/ridos/Desktop/firefox.desktop << 'EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Firefox Browser
          Exec=firefox-esr %u
          Icon=firefox-esr
          Terminal=false
          Categories=Network;WebBrowser;
          EOF

          # Install to HDD shortcut
          sudo tee chroot/home/ridos/Desktop/install-ridos.desktop << 'EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Install RIDOS OS to HDD
          Comment=Install RIDOS OS permanently to your hard drive
          Exec=xfce4-terminal --title="RIDOS OS Installer" -e "sudo /opt/ridos/bin/ridos-install.sh"
          Icon=drive-harddisk
          Terminal=false
          Categories=System;
          EOF

          sudo tee chroot/home/ridos/Desktop/ai-features.desktop << 'EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=RIDOS AI Tools
          Comment=AI Network Analyzer, System Doctor, Security Scanner
          Exec=xfce4-terminal --title="RIDOS AI Tools" -e "python3 /opt/ridos/bin/ai_features.py"
          Icon=utilities-system-monitor
          Terminal=false
          Categories=System;Network;
          EOF

          sudo tee chroot/home/ridos/Desktop/system-doctor.desktop << 'EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=AI System Doctor
          Comment=AI health check | طبيب النظام الذكي
          Exec=xfce4-terminal --title="AI System Doctor" -e "bash -c 'python3 /opt/ridos/bin/ai_features.py 2; read'"
          Icon=utilities-system-monitor
          Terminal=false
          Categories=System;
          EOF

          sudo tee chroot/home/ridos/Desktop/hardware-fixer.desktop << 'EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=AI Hardware Fixer
          Comment=HDD/SSD/NVMe/RAM diagnostics | فحص وإصلاح العتاد
          Exec=xfce4-terminal --title="AI Hardware Fixer" -e "bash -c 'python3 /opt/ridos/bin/ai_features.py 4; read'"
          Icon=drive-harddisk
          Terminal=false
          Categories=System;
          EOF

          sudo tee chroot/home/ridos/Desktop/security-scanner.desktop << 'EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=AI Security Scanner
          Comment=AI cybersecurity scanner | الماسح الأمني الذكي
          Exec=xfce4-terminal --title="AI Security Scanner" -e "bash -c 'python3 /opt/ridos/bin/ai_features.py 5; read'"
          Icon=security-high
          Terminal=false
          Categories=System;Network;
          EOF

          sudo tee chroot/home/ridos/Desktop/network-analyzer.desktop << 'EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=AI Network Analyzer
          Comment=Advanced network analysis | محلل الشبكة المتقدم
          Exec=xfce4-terminal --title="AI Network Analyzer" -e "bash -c 'python3 /opt/ridos/bin/ai_features.py 3; read'"
          Icon=network-wired
          Terminal=false
          Categories=Network;System;
          EOF

          # Remove old shortcuts and create clean professional layout
          sudo rm -f chroot/home/ridos/Desktop/*.desktop

          echo '[Desktop Entry]'                    | sudo tee    chroot/home/ridos/Desktop/01-ridos-dashboard.desktop > /dev/null
          echo 'Type=Application'                  | sudo tee -a chroot/home/ridos/Desktop/01-ridos-dashboard.desktop > /dev/null
          echo 'Name=RIDOS Dashboard'              | sudo tee -a chroot/home/ridos/Desktop/01-ridos-dashboard.desktop > /dev/null
          echo 'Exec=python3 /opt/ridos/bin/ridos_dashboard.py' | sudo tee -a chroot/home/ridos/Desktop/01-ridos-dashboard.desktop > /dev/null
          echo 'Icon=utilities-system-monitor'     | sudo tee -a chroot/home/ridos/Desktop/01-ridos-dashboard.desktop > /dev/null
          echo 'Terminal=false'                    | sudo tee -a chroot/home/ridos/Desktop/01-ridos-dashboard.desktop > /dev/null

          echo '[Desktop Entry]'                    | sudo tee    chroot/home/ridos/Desktop/02-health-report.desktop > /dev/null
          echo 'Type=Application'                  | sudo tee -a chroot/home/ridos/Desktop/02-health-report.desktop > /dev/null
          echo 'Name=Health Report'                | sudo tee -a chroot/home/ridos/Desktop/02-health-report.desktop > /dev/null
          echo 'Exec=xfce4-terminal --title=Health-Report -e "python3 /opt/ridos/bin/health_report.py --full"' | sudo tee -a chroot/home/ridos/Desktop/02-health-report.desktop > /dev/null
          echo 'Icon=utilities-system-monitor'     | sudo tee -a chroot/home/ridos/Desktop/02-health-report.desktop > /dev/null
          echo 'Terminal=false'                    | sudo tee -a chroot/home/ridos/Desktop/02-health-report.desktop > /dev/null

          echo '[Desktop Entry]'                    | sudo tee    chroot/home/ridos/Desktop/03-ai-shell.desktop > /dev/null
          echo 'Type=Application'                  | sudo tee -a chroot/home/ridos/Desktop/03-ai-shell.desktop > /dev/null
          echo 'Name=RIDOS AI Shell'               | sudo tee -a chroot/home/ridos/Desktop/03-ai-shell.desktop > /dev/null
          echo 'Exec=xfce4-terminal --title=RIDOS-AI-Shell -e "python3 /opt/ridos/bin/ridos_shell.py"' | sudo tee -a chroot/home/ridos/Desktop/03-ai-shell.desktop > /dev/null
          echo 'Icon=utilities-terminal'           | sudo tee -a chroot/home/ridos/Desktop/03-ai-shell.desktop > /dev/null
          echo 'Terminal=false'                    | sudo tee -a chroot/home/ridos/Desktop/03-ai-shell.desktop > /dev/null

          echo '[Desktop Entry]'                    | sudo tee    chroot/home/ridos/Desktop/04-software-center.desktop > /dev/null
          echo 'Type=Application'                  | sudo tee -a chroot/home/ridos/Desktop/04-software-center.desktop > /dev/null
          echo 'Name=Software Center'              | sudo tee -a chroot/home/ridos/Desktop/04-software-center.desktop > /dev/null
          echo 'Exec=python3 /opt/ridos/bin/ridos_software_center.py' | sudo tee -a chroot/home/ridos/Desktop/04-software-center.desktop > /dev/null
          echo 'Icon=system-software-install'      | sudo tee -a chroot/home/ridos/Desktop/04-software-center.desktop > /dev/null
          echo 'Terminal=false'                    | sudo tee -a chroot/home/ridos/Desktop/04-software-center.desktop > /dev/null

          echo '[Desktop Entry]'                    | sudo tee    chroot/home/ridos/Desktop/05-install-ridos.desktop > /dev/null
          echo 'Type=Application'                  | sudo tee -a chroot/home/ridos/Desktop/05-install-ridos.desktop > /dev/null
          echo 'Name=Install RIDOS OS'             | sudo tee -a chroot/home/ridos/Desktop/05-install-ridos.desktop > /dev/null
          echo 'Exec=xfce4-terminal --title=RIDOS-Installer -e "sudo /opt/ridos/bin/ridos-install.sh"' | sudo tee -a chroot/home/ridos/Desktop/05-install-ridos.desktop > /dev/null
          echo 'Icon=drive-harddisk'               | sudo tee -a chroot/home/ridos/Desktop/05-install-ridos.desktop > /dev/null
          echo 'Terminal=false'                    | sudo tee -a chroot/home/ridos/Desktop/05-install-ridos.desktop > /dev/null

          echo '[Desktop Entry]'                    | sudo tee    chroot/home/ridos/Desktop/06-files.desktop > /dev/null
          echo 'Type=Application'                  | sudo tee -a chroot/home/ridos/Desktop/06-files.desktop > /dev/null
          echo 'Name=File Manager'                 | sudo tee -a chroot/home/ridos/Desktop/06-files.desktop > /dev/null
          echo 'Exec=thunar'                       | sudo tee -a chroot/home/ridos/Desktop/06-files.desktop > /dev/null
          echo 'Icon=system-file-manager'          | sudo tee -a chroot/home/ridos/Desktop/06-files.desktop > /dev/null
          echo 'Terminal=false'                    | sudo tee -a chroot/home/ridos/Desktop/06-files.desktop > /dev/null

          sudo chmod +x chroot/home/ridos/Desktop/*.desktop

          # Dashboard autostart
          sudo mkdir -p chroot/home/ridos/.config/autostart
          echo '[Desktop Entry]'                    | sudo tee    chroot/home/ridos/.config/autostart/ridos-dashboard.desktop > /dev/null
          echo 'Type=Application'                  | sudo tee -a chroot/home/ridos/.config/autostart/ridos-dashboard.desktop > /dev/null
          echo 'Name=RIDOS Dashboard'              | sudo tee -a chroot/home/ridos/.config/autostart/ridos-dashboard.desktop > /dev/null
          echo 'Exec=python3 /opt/ridos/bin/ridos_dashboard.py' | sudo tee -a chroot/home/ridos/.config/autostart/ridos-dashboard.desktop > /dev/null
          echo 'Hidden=false'                      | sudo tee -a chroot/home/ridos/.config/autostart/ridos-dashboard.desktop > /dev/null

          sudo tee chroot/home/ridos/.config/xfce4/helpers.rc << 'EOF'
          TerminalEmulator=xfce4-terminal
          EOF

          # Plymouth boot splash
          sudo mkdir -p chroot/usr/share/plymouth/themes/ridos
          sudo tee chroot/usr/share/plymouth/themes/ridos/ridos.plymouth << 'EOF'
          [Plymouth Theme]
          Name=RIDOS OS
          Description=RIDOS OS Boot Splash
          ModuleName=script

          [script]
          ImageDir=/usr/share/plymouth/themes/ridos
          ScriptFile=/usr/share/plymouth/themes/ridos/ridos.script
          EOF

          sudo tee chroot/usr/share/plymouth/themes/ridos/ridos.script << 'EOF'
          Window.SetBackgroundTopColor(0.42, 0.13, 0.66);
          Window.SetBackgroundBottomColor(0.12, 0.07, 0.27);
          message_sprite = Sprite();
          message_sprite.SetPosition(Window.GetWidth()/2 - 150, Window.GetHeight()/2 - 20, 10000);
          fun refresh_callback() {
            message_image = Image.Text("RIDOS OS v1.1.0 Baghdad", 1.0, 1.0, 1.0);
            message_sprite.SetImage(message_image);
          }
          Plymouth.SetRefreshFunction(refresh_callback);
          EOF

          sudo chroot chroot chown -R ridos:ridos /home/ridos
          echo "Branding applied"

      - name: Install RIDOS core files and installer
        run: |
          sudo mkdir -p chroot/opt/ridos/bin
          sudo mkdir -p chroot/usr/share/ridos
          sudo cp ridos-core/*.py chroot/opt/ridos/bin/
          sudo cp build-system/scripts/ai_features.py chroot/opt/ridos/bin/ 2>/dev/null || true
          sudo chmod +x chroot/opt/ridos/bin/*.py
          sudo cp legal/LICENSE.txt legal/COPYRIGHT legal/CONTRIBUTORS.md \
               chroot/usr/share/ridos/

          # RIDOS HDD Installer script
          sudo tee chroot/opt/ridos/bin/ridos-install.sh << 'INSTALLEOF'
          #!/bin/bash
          # RIDOS OS HDD Installer

          clear
          echo "============================================"
          echo "   RIDOS OS v1.1.0 Baghdad - HDD Installer"
          echo "============================================"
          echo ""
          echo "WARNING: This will ERASE all data on the selected disk!"
          echo ""

          # List available disks
          echo "Available disks:"
          lsblk -d -o NAME,SIZE,MODEL | grep -v loop
          echo ""

          read -p "Enter disk to install to (e.g. sda, sdb): " DISK
          DISK="/dev/$DISK"

          if [ ! -b "$DISK" ]; then
            echo "ERROR: Disk $DISK not found!"
            read -p "Press Enter to exit..."
            exit 1
          fi

          echo ""
          echo "You selected: $DISK"
          lsblk "$DISK"
          echo ""
          read -p "ARE YOU SURE? All data on $DISK will be ERASED! Type YES to continue: " CONFIRM

          if [ "$CONFIRM" != "YES" ]; then
            echo "Installation cancelled."
            read -p "Press Enter to exit..."
            exit 0
          fi

          echo ""
          echo "Starting installation..."

          # Partition the disk
          echo "Partitioning disk..."
          parted -s "$DISK" mklabel msdos
          parted -s "$DISK" mkpart primary ext4 1MiB 100%
          parted -s "$DISK" set 1 boot on

          PARTITION="${DISK}1"
          sleep 2

          # Format partition
          echo "Formatting partition..."
          mkfs.ext4 -F "$PARTITION"

          # Mount partition
          echo "Mounting partition..."
          mkdir -p /mnt/ridos-install
          mount "$PARTITION" /mnt/ridos-install

          # Copy system
          echo "Copying RIDOS OS files (this may take 10-20 minutes)..."
          rsync -ax --exclude=/proc --exclude=/sys --exclude=/dev \
            --exclude=/run --exclude=/mnt --exclude=/media \
            / /mnt/ridos-install/

          # Create required dirs
          mkdir -p /mnt/ridos-install/{proc,sys,dev,run,mnt,media}

          # Install GRUB bootloader
          echo "Installing GRUB bootloader..."
          mount --bind /dev /mnt/ridos-install/dev
          mount --bind /proc /mnt/ridos-install/proc
          mount --bind /sys /mnt/ridos-install/sys

          # Update fstab
          UUID=$(blkid -s UUID -o value "$PARTITION")
          echo "UUID=$UUID / ext4 errors=remount-ro 0 1" > /mnt/ridos-install/etc/fstab

          # Remove live-boot from installed system
          chroot /mnt/ridos-install apt-get remove -y live-boot live-boot-initramfs-tools 2>/dev/null || true
          chroot /mnt/ridos-install update-initramfs -u 2>/dev/null || true
          chroot /mnt/ridos-install grub-install "$DISK"
          chroot /mnt/ridos-install update-grub

          # Update GRUB config for installed system
          sed -i 's/boot=live //' /mnt/ridos-install/boot/grub/grub.cfg 2>/dev/null || true

          umount /mnt/ridos-install/sys
          umount /mnt/ridos-install/proc
          umount /mnt/ridos-install/dev
          umount /mnt/ridos-install

          echo ""
          echo "============================================"
          echo "  RIDOS OS installed successfully!"
          echo "  Remove the USB/DVD and reboot."
          echo "============================================"
          read -p "Press Enter to exit..."
          INSTALLEOF

          sudo chmod +x chroot/opt/ridos/bin/ridos-install.sh

          # RIDOS welcome banner
          sudo tee chroot/etc/motd << 'EOF'

            ██████╗ ██╗██████╗  ██████╗ ███████╗
            ██╔══██╗██║██╔══██╗██╔═══██╗██╔════╝
            ██████╔╝██║██║  ██║██║   ██║███████╗
            ██╔══██╗██║██║  ██║██║   ██║╚════██║
            ██║  ██║██║██████╔╝╚██████╔╝███████║
            ╚═╝  ╚═╝╚═╝╚═════╝  ╚═════╝ ╚══════╝

            RIDOS OS v1.1.0 "Baghdad" — Field Engineer OS / IT Rescue OS
            AI-Powered Linux for IT Professionals
            Username: ridos  |  Password: ridos
            AI Shell: python3 /opt/ridos/bin/ridos_shell.py
            Install:  sudo /opt/ridos/bin/ridos-install.sh

          EOF

          # Autostart welcome terminal
          sudo mkdir -p chroot/home/ridos/.config/autostart
          sudo tee chroot/home/ridos/.config/autostart/ridos-welcome.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=RIDOS Welcome
          Exec=xfce4-terminal --title="RIDOS OS v1.1.0 Baghdad" -e "bash -c 'neofetch; echo; echo \"  Welcome to RIDOS OS v1.1.0 Baghdad\"; echo \"  AI Shell: python3 /opt/ridos/bin/ridos_shell.py\"; echo \"  Install:  sudo /opt/ridos/bin/ridos-install.sh\"; echo; bash'"
          Hidden=false
          NoDisplay=false
          X-GNOME-Autostart-enabled=true
          EOF

          # Neofetch config
          sudo mkdir -p chroot/home/ridos/.config/neofetch
          sudo tee chroot/home/ridos/.config/neofetch/config.conf << 'EOF'
          print_info() {
              info title
              info "OS" distro
              info "Host" model
              info "Kernel" kernel
              info "Uptime" uptime
              info "Shell" shell
              info "DE" de
              info "CPU" cpu
              info "Memory" memory
          }
          ascii_distro="auto"
          EOF

          sudo chroot chroot chown -R ridos:ridos /home/ridos
          echo "RIDOS files installed"

      - name: Build squashfs
        run: |
          sudo mksquashfs chroot filesystem.squashfs \
            -comp lz4 -Xhc -b 256K -no-progress -e boot
          echo "squashfs: $(du -sh filesystem.squashfs)"

      - name: Prepare ISO structure
        run: |
          mkdir -p iso/live iso/boot/grub
          cp filesystem.squashfs iso/live/
          KERNEL=$(ls chroot/boot/vmlinuz-* 2>/dev/null | sort -V | tail -1)
          INITRD=$(ls chroot/boot/initrd.img-* 2>/dev/null | sort -V | tail -1)
          echo "Kernel: $KERNEL  Initrd: $INITRD"
          cp "$KERNEL" iso/live/vmlinuz
          cp "$INITRD" iso/live/initrd
          cat > iso/boot/grub/grub.cfg << 'GRUBEOF'
          set default=0
          set timeout=5

          menuentry "RIDOS OS v1.1.0 Baghdad" {
            linux /live/vmlinuz boot=live quiet splash
            initrd /live/initrd
          }
          menuentry "RIDOS OS (safe mode)" {
            linux /live/vmlinuz boot=live nomodeset
            initrd /live/initrd
          }
          menuentry "RIDOS OS (debug)" {
            linux /live/vmlinuz boot=live
            initrd /live/initrd
          }
          GRUBEOF
          echo "ISO structure ready"

      - name: Build GRUB and create ISO
        run: |
          # ── Step 1: Build GRUB BIOS core image ──────────────────
          # Use grub-mkimage to create a minimal BIOS boot image
          grub-mkimage \
            -O i386-pc \
            -o bios.core.img \
            -p "/boot/grub" \
            iso9660 linux normal biosdisk search
          # Prepend cdboot.img to make it El Torito bootable
          cat /usr/lib/grub/i386-pc/cdboot.img bios.core.img > bios.img
          echo "BIOS boot image: $(du -sh bios.img)"

          # ── Step 2: Build GRUB EFI image ─────────────────────────
          grub-mkimage \
            -O x86_64-efi \
            -o bootx64.efi \
            -p "/boot/grub" \
            iso9660 linux normal search
          echo "EFI boot image: $(du -sh bootx64.efi)"

          # ── Step 3: Create EFI system partition image ─────────────
          # This is what makes Rufus ISO mode work properly
          dd if=/dev/zero of=efi.img bs=1M count=10
          mkfs.vfat -F 12 efi.img
          mmd -i efi.img ::/EFI ::/EFI/boot
          mcopy -i efi.img bootx64.efi ::/EFI/boot/bootx64.efi
          echo "EFI partition: $(du -sh efi.img)"

          # ── Step 4: Copy GRUB files into ISO tree ────────────────
          mkdir -p iso/boot/grub/i386-pc
          cp /usr/lib/grub/i386-pc/*.mod iso/boot/grub/i386-pc/ 2>/dev/null || true
          cp /usr/lib/grub/i386-pc/*.lst iso/boot/grub/i386-pc/ 2>/dev/null || true
          cp bios.img iso/boot/grub/bios.img

          # ── Step 5: Create fully compatible ISO with xorriso ─────
          # This command creates an ISO that is:
          # - Bootable in VirtualBox (BIOS + UEFI)
          # - Compatible with Rufus ISO mode AND DD mode
          # - Compatible with direct CD/DVD burning
          # - Recognized by all major tools
          xorriso -as mkisofs \
            -iso-level 3 \
            -full-iso9660-filenames \
            -volid "RIDOS_OS_1.1" \
            -publisher "RIDOS OS Project" \
            -preparer "RIDOS OS Build System" \
            --grub2-mbr /usr/lib/grub/i386-pc/boot_hybrid.img \
            -partition_offset 16 \
            --mbr-force-bootable \
            -append_partition 2 0xef efi.img \
            -appended_part_as_gpt \
            -iso_mbr_part_type 0x00 \
            -c boot/grub/boot.cat \
            -b boot/grub/bios.img \
            -no-emul-boot \
            -boot-load-size 4 \
            -boot-info-table \
            --grub2-boot-info \
            -eltorito-alt-boot \
            -e --interval:appended_partition_2:all:: \
            -no-emul-boot \
            -o ridos-os-1.1.0-Baghdad-x86_64.iso \
            -graft-points \
              "/boot/grub/bios.img=bios.img" \
              "/=iso"

          # ── Step 6: Verify the ISO ───────────────────────────────
          echo ""
          echo "=== ISO Information ==="
          ls -lh ridos-os-1.1.0-Baghdad-x86_64.iso
          file ridos-os-1.1.0-Baghdad-x86_64.iso

          echo ""
          echo "=== Boot sector check (first 512 bytes) ==="
          dd if=ridos-os-1.1.0-Baghdad-x86_64.iso bs=512 count=1 2>/dev/null | xxd | head -8

          echo ""
          echo "=== ISO partition table ==="
          fdisk -l ridos-os-1.1.0-Baghdad-x86_64.iso 2>/dev/null || true

          echo ""
          echo "=== El Torito boot catalog ==="
          xorriso -indev ridos-os-1.1.0-Baghdad-x86_64.iso \
            -report_el_torito as_mkisofs 2>/dev/null || true

          # ── Step 7: Generate checksums ───────────────────────────
          md5sum ridos-os-1.1.0-Baghdad-x86_64.iso > ridos-os-1.1.0-Baghdad-x86_64.iso.md5
          sha256sum ridos-os-1.1.0-Baghdad-x86_64.iso > ridos-os-1.1.0-Baghdad-x86_64.iso.sha256
          echo ""
          echo "✅ ISO ready! Bootable in VirtualBox, Rufus ISO mode, Rufus DD mode"

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: RIDOS-OS-1.1.0-Baghdad
          path: |
            ridos-os-1.1.0-Baghdad-x86_64.iso
            ridos-os-1.1.0-Baghdad-x86_64.iso.md5
            ridos-os-1.1.0-Baghdad-x86_64.iso.sha256
          retention-days: 30

      - name: Create GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release create "${{ github.ref_name }}" \
            ridos-os-1.1.0-Baghdad-x86_64.iso \
            ridos-os-1.1.0-Baghdad-x86_64.iso.md5 \
            --title "RIDOS OS ${{ github.ref_name }} Baghdad" \
            --notes "## RIDOS OS v1.1.0 Baghdad
          AI-Powered Linux for IT Professionals

          ### Included:
          - XFCE desktop with dark purple theme
          - Firefox ESR browser
          - RIDOS AI Shell (Claude AI powered)
          - RIDOS Dashboard (GUI launcher for all tools)
          - One-command Health Report
          - Ansible Automation Runner
          - Software Center
          - HDD Installer included
          - Full hardware driver support
          - Network tools: nmap, traceroute, net-tools
          - Development: Python3, Git, Vim

          ### Login:
          - Username: ridos  |  Password: ridos

          Built on Debian bookworm | GPL v3"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
